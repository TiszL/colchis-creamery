<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>My Pantry — Colchis Food</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,300..500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Noto+Serif+Georgian:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="site/responsive.css" />
<style>
  html, body { margin: 0; padding: 0; background: #F5F0E6; font-family: 'Inter', sans-serif; color: #1F3026; }
  * { box-sizing: border-box; }
  button, input, textarea { font-family: inherit; }
  input:focus, textarea:focus { border-color: #1F3026 !important; }
  .ch-account > div:last-child > div { min-width: 0; }
  @media (max-width: 1180px) {
    .ch-account-banner { grid-template-columns: 1fr !important; padding: 48px 32px 32px !important; gap: 28px !important; }
    .ch-account-h1 { font-size: 60px !important; }
    .ch-account-tabs { padding: 0 32px !important; }
    .ch-account > div:last-child { padding: 36px 32px 72px !important; }
    .ch-account > div:last-child > div { grid-template-columns: 1fr !important; gap: 24px !important; }
    .ch-account > div:last-child > div > div[style*="grid-template-columns: repeat(4"] { grid-template-columns: repeat(2, 1fr) !important; }
  }
  @media (max-width: 720px) {
    .ch-account-h1 { font-size: 42px !important; }
    .ch-account > div:last-child > div > div { grid-template-columns: 1fr !important; }
    .ch-account > div:last-child div[style*="grid-template-columns: 1.5fr 1fr auto"] { grid-template-columns: 1fr !important; gap: 14px !important; }
    .ch-account > div:last-child div[style*="grid-template-columns: auto 1fr auto auto auto"] { grid-template-columns: 1fr !important; gap: 8px !important; }
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="brand/sublockups.jsx"></script>
<script type="text/babel" src="site/header-hero.jsx"></script>
<script type="text/babel" src="site/sections.jsx"></script>
<script type="text/babel" src="site/login.jsx"></script>
<script type="text/babel" src="site/account.jsx"></script>
<script type="text/babel">
const PALETTE = { cream: "#F5F0E6", cream2: "#EAE2D2", ink: "#1F3026", ink2: "#2C3D33", accent: "#B96A3D", accent2: "#D9A876", muted: "#7A8278" };
function App() {
  return (
    <div>
      <SiteHeader palette={PALETTE} />
      <AccountPage palette={PALETTE} />
      <Footer palette={PALETTE} />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
