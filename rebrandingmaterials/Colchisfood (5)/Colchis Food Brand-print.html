<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Colchis Food — Brand Identity (Print)</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,300..500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Noto+Serif+Georgian:wght@400;500&family=Noto+Sans+Georgian:wght@400;500&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #F5F0E6; font-family: 'Inter', sans-serif; color: #1F3026; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  * { box-sizing: border-box; }

  .page {
    width: 277mm;
    min-height: 190mm;
    margin: 0 auto;
    padding: 14mm 14mm 10mm;
    background: #F5F0E6;
    page-break-after: always;
    break-after: page;
    page-break-inside: avoid;
    break-inside: avoid;
    position: relative;
  }
  .page:last-child { page-break-after: auto; }

  .page-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    border-bottom: 1px solid #C9BEA3;
    padding-bottom: 8px;
    margin-bottom: 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #7A8278;
  }
  .page-head .sec {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 16px;
    color: #1F3026;
    text-transform: none;
    letter-spacing: 0;
  }

  .row {
    display: flex;
    flex-wrap: wrap;
    gap: 12mm;
    align-items: flex-start;
    justify-content: center;
  }
  .ab {
    display: flex;
    flex-direction: column;
    align-items: stretch;
  }
  .ab-label {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 500;
    color: #4A574E;
    margin-bottom: 6px;
  }
  .ab-frame {
    box-shadow: 0 0 0 1px #C9BEA3;
    overflow: hidden;
    background: #fff;
    transform-origin: top left;
  }

  @page { size: A4 landscape; margin: 0; }
  @media print {
    body { background: #F5F0E6 !important; }
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<!-- Stub the canvas exports so the brand component files can load standalone -->
<script>
  window.DesignCanvas = function(p){ return null; };
  window.DCSection = function(p){ return null; };
  window.DCArtboard = function(p){ return null; };
  window.DCPostIt = function(p){ return null; };
  window.TweaksPanel = function(p){ return null; };
  window.TweakSection = function(p){ return null; };
  window.TweakSelect = function(p){ return null; };
  window.useTweaks = function(d){ return [d, ()=>{}]; };
</script>

<script type="text/babel" src="brand/logos.jsx"></script>
<script type="text/babel" src="brand/palettes.jsx"></script>
<script type="text/babel" src="brand/typography.jsx"></script>
<script type="text/babel" src="brand/sublockups.jsx"></script>
<script type="text/babel" src="brand/applications.jsx"></script>
<script type="text/babel" src="brand/hero.jsx"></script>

<script type="text/babel">
const { useEffect, useState } = React;

// ── Layout helpers ────────────────────────────────────────────────────
// Page usable area is ~249mm × 166mm (A4 landscape minus padding).
// Convert mm → px at 96dpi (1mm = 3.7795px) for layout math.
const PAGE_W_PX = 249 * 3.7795; // ~941px
const PAGE_H_PX = 166 * 3.7795; // ~628px

function Artboard({ label, w, h, children, maxW = PAGE_W_PX, maxH = PAGE_H_PX }) {
  // Scale uniformly so the artboard fits within (maxW, maxH).
  const scale = Math.min(maxW / w, maxH / h, 1);
  return (
    <div className="ab">
      <div className="ab-label">{label}</div>
      <div className="ab-frame" style={{ width: w * scale, height: h * scale }}>
        <div style={{ width: w, height: h, transform: `scale(${scale})`, transformOrigin: 'top left' }}>
          {children}
        </div>
      </div>
    </div>
  );
}

function Page({ section, page, children }) {
  return (
    <div className="page">
      <div className="page-head">
        <span className="sec">{section}</span>
        <span>Colchis Food · Brand Identity · {page}</span>
      </div>
      {children}
    </div>
  );
}

// ── Cover ─────────────────────────────────────────────────────────────
function Cover() {
  const p = window.PALETTES.forest;
  return (
    <div className="page" style={{ background: p.cream, display: 'flex', flexDirection: 'column', justifyContent: 'space-between', minHeight: '190mm' }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', fontFamily: 'JetBrains Mono, monospace', fontSize: 10, letterSpacing: '0.25em', color: p.muted, textTransform: 'uppercase' }}>
        <span>Vol. I · Brand Identity</span>
        <span>MMXXVI · Dublin, Ohio</span>
      </div>
      <div style={{ textAlign: 'left' }}>
        <div style={{ fontFamily: 'Fraunces, serif', fontSize: 120, fontWeight: 400, lineHeight: 0.9, color: p.ink, letterSpacing: '-0.02em' }}>Colchis</div>
        <div style={{ fontFamily: 'Fraunces, serif', fontSize: 120, fontWeight: 300, fontStyle: 'italic', lineHeight: 0.9, color: p.accent, letterSpacing: '-0.02em' }}>Food.</div>
        <div style={{ marginTop: 24, fontFamily: 'JetBrains Mono, monospace', fontSize: 11, letterSpacing: '0.3em', color: p.muted, textTransform: 'uppercase' }}>Cheese · Bread · Wine</div>
      </div>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end' }}>
        <div style={{ fontFamily: 'Fraunces, serif', fontStyle: 'italic', fontWeight: 300, fontSize: 22, lineHeight: 1.3, maxWidth: 420, color: p.ink }}>
          A 2,000-year tradition, baked, churned and aged in the American Midwest.
        </div>
        <div style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 9, letterSpacing: '0.25em', color: p.muted, textTransform: 'uppercase', textAlign: 'right', lineHeight: 2 }}>
          Edition 01<br/>colchisfood.com
        </div>
      </div>
    </div>
  );
}

// ── App: render every artboard from the canvas as its own page(s) ────
function App() {
  const [ready, setReady] = useState(false);
  useEffect(() => {
    // Wait one tick so brand component scripts have evaluated
    const t = setTimeout(() => setReady(true), 50);
    return () => clearTimeout(t);
  }, []);
  if (!ready) return null;

  const P = window.PALETTES;
  const palette = P.forest;

  return (
    <>
      <Cover />

      {/* 01 — Logo concepts */}
      <Page section="01 · Logo Concepts" page="p. 02">
        <div className="row">
          <Artboard label="A · Stone-Carved CF (recommended)" w={520} h={620} maxW={300}>
            <div style={{ width: 520, height: 620, background: palette.cream, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <window.LogoAsomtavruli palette={palette} size={360} />
            </div>
          </Artboard>
          <Artboard label="B · Editorial Wrdmark" w={520} h={620} maxW={300}>
            <div style={{ width: 520, height: 620, background: palette.cream, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <window.LogoWordmark palette={palette} size={400} />
            </div>
          </Artboard>
          <Artboard label="C · Borjgali Sun-Wheel" w={520} h={620} maxW={300}>
            <div style={{ width: 520, height: 620, background: palette.cream, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <window.LogoBorjgali palette={palette} size={360} />
            </div>
          </Artboard>
        </div>
      </Page>

      <Page section="01 · Logo on dark" page="p. 03">
        <div className="row">
          <Artboard label="Mark · reversed on ink" w={520} h={620} maxW={500}>
            <div style={{ width: 520, height: 620, background: palette.ink, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <div style={{ filter: 'invert(1) hue-rotate(180deg)' }}>
                <window.LogoAsomtavruli palette={{ ...palette, ink: palette.cream, cream: palette.ink }} size={360} />
              </div>
            </div>
          </Artboard>
        </div>
      </Page>

      {/* 02 — Palettes */}
      <Page section="02 · Color Palettes" page="p. 04">
        <div className="row">
          {Object.entries(P).map(([key, pal]) => (
            <Artboard key={key} label={pal.name} w={720} h={400} maxW={420}>
              <window.PaletteCard palette={pal} active={key === 'forest'} />
            </Artboard>
          ))}
        </div>
      </Page>

      {/* 03 — Typography */}
      <Page section="03 · Typography" page="p. 05">
        <div className="row">
          <Artboard label="Fraunces · Inter · JetBrains Mono · Noto Georgian" w={1280} h={920} maxW={PAGE_W_PX} maxH={PAGE_H_PX}>
            <window.TypeSpecimen palette={palette} />
          </Artboard>
        </div>
      </Page>

      {/* 04 — Sub-brands */}
      <Page section="04 · Sub-Brands" page="p. 06">
        <div className="row">
          <Artboard label="The Creamery" w={420} h={520} maxW={290}>
            <div style={{ width: 420, height: 520, background: palette.cream, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <window.SubBrandLockup palette={palette} sub="The Creamery" />
            </div>
          </Artboard>
          <Artboard label="The Bakery" w={420} h={520} maxW={290}>
            <div style={{ width: 420, height: 520, background: palette.ink, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <window.SubBrandLockup palette={palette} sub="The Bakery" dark accentOverride={palette.accent2 || palette.accent} />
            </div>
          </Artboard>
          <Artboard label="The Winery" w={420} h={520} maxW={290}>
            <div style={{ width: 420, height: 520, background: palette.cream2, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <window.SubBrandLockup palette={palette} sub="The Winery" />
            </div>
          </Artboard>
        </div>
      </Page>

      {/* 05 — Packaging */}
      <Page section="05 · Packaging" page="p. 07">
        <div className="row">
          <Artboard label="Cheese label & bakery box" w={1280} h={620} maxW={PAGE_W_PX} maxH={PAGE_H_PX}>
            <window.PackagingMock palette={palette} />
          </Artboard>
        </div>
      </Page>

      {/* 06 — Applications */}
      <Page section="06 · Applications" page="p. 08">
        <div className="row">
          <Artboard label="Stamp · Receipt · Tote · Stickers" w={1280} h={520} maxW={PAGE_W_PX} maxH={PAGE_H_PX}>
            <window.ApplicationsRow palette={palette} />
          </Artboard>
        </div>
      </Page>

      {/* 07 — Homepage hero */}
      <Page section="07 · Homepage Hero" page="p. 09">
        <div className="row">
          <Artboard label="Hero · 1440 × 900 · with smart delivery" w={1440} h={900} maxW={PAGE_W_PX} maxH={PAGE_H_PX}>
            <window.HomepageHero palette={palette} />
          </Artboard>
        </div>
      </Page>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

/* ── Auto-print bootstrap: wait for fonts + render, then print() ─── */
(async function bootPrint() {
  try { if (document.fonts && document.fonts.ready) await document.fonts.ready; } catch (e) {}
  await new Promise(r => setTimeout(r, 1200));
  window.print();
})();
</script>
</body>
</html>
