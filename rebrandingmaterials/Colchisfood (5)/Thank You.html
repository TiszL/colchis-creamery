<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Thank you — Colchis Food</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,300..500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Noto+Serif+Georgian:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="site/responsive.css" />
<style>
  html, body { margin: 0; padding: 0; background: #F5F0E6; font-family: 'Inter', sans-serif; color: #1F3026; }
  * { box-sizing: border-box; }
  button, input, textarea { font-family: inherit; }
  .ch-thanks-body > div { min-width: 0; }
  .ch-thanks-row { min-width: 0; }
  .ch-thanks-row > div { min-width: 0; }
  @media (max-width: 1180px) {
    .ch-thanks-hero { padding: 64px 32px 52px !important; }
    .ch-thanks-h1 { font-size: 88px !important; }
    .ch-thanks-body { grid-template-columns: 1fr !important; padding: 40px 32px 80px !important; gap: 32px !important; }
    .ch-thanks-after { grid-template-columns: 1fr !important; gap: 28px !important; padding: 48px 32px !important; }
  }
  @media (max-width: 820px) {
    .ch-thanks-hero { padding: 48px 24px 40px !important; }
    .ch-thanks-h1 { font-size: 60px !important; }
    .ch-thanks-body { padding: 32px 20px 64px !important; }
    .ch-thanks-body > div:first-child > div > div[style*="grid-template-columns: repeat(4"] { grid-template-columns: repeat(2, 1fr) !important; gap: 18px !important; }
    .ch-thanks-row { grid-template-columns: 56px minmax(0, 1fr) auto !important; grid-template-areas: "img info qty" "img info price" !important; gap: 6px 14px !important; }
    .ch-thanks-row > div:nth-child(1) { width: 56px !important; height: 56px !important; grid-area: img; }
    .ch-thanks-row > div:nth-child(2) { grid-area: info; }
    .ch-thanks-row > div:nth-child(3) { grid-area: qty; justify-self: end; align-self: start; }
    .ch-thanks-row > div:nth-child(4) { grid-area: price; justify-self: end; align-self: end; }
  }
  @media (max-width: 540px) {
    .ch-thanks-h1 { font-size: 44px !important; }
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="brand/sublockups.jsx"></script>
<script type="text/babel" src="site/header-hero.jsx"></script>
<script type="text/babel" src="site/sections.jsx"></script>
<script type="text/babel" src="site/thanks.jsx"></script>
<script type="text/babel">
const PALETTE = { cream: "#F5F0E6", cream2: "#EAE2D2", ink: "#1F3026", ink2: "#2C3D33", accent: "#B96A3D", accent2: "#D9A876", muted: "#7A8278" };
function App() {
  return (
    <div>
      <SiteHeader palette={PALETTE} />
      <ThankYouPage palette={PALETTE} />
      <Footer palette={PALETTE} />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
