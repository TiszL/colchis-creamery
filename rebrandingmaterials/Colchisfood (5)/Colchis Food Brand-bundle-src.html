<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Colchis Food — Brand Identity</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,300..500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Noto+Serif+Georgian:wght@400;500&family=Noto+Sans+Georgian:wght@400;500&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #1a1a1a; font-family: 'Inter', sans-serif; }
  * { box-sizing: border-box; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<template id="__bundler_thumbnail" data-bg-color="#1F3026">
  <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <rect width="200" height="200" fill="#1F3026"/>
    <circle cx="100" cy="100" r="64" fill="none" stroke="#F5F0E6" stroke-width="2"/>
    <text x="100" y="118" font-family="Georgia, serif" font-weight="500" font-size="56" fill="#F5F0E6" text-anchor="middle" letter-spacing="2">CF</text>
    <g transform="translate(100,148) rotate(45)"><rect x="-3" y="-3" width="6" height="6" fill="#B96A3D"/></g>
  </svg>
</template>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="brand/logos.jsx"></script>
<script type="text/babel" src="brand/palettes.jsx"></script>
<script type="text/babel" src="brand/typography.jsx"></script>
<script type="text/babel" src="brand/sublockups.jsx"></script>
<script type="text/babel" src="brand/applications.jsx"></script>
<script type="text/babel" src="brand/hero.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const TWEAKS_DEFAULTS = /*EDITMODE-BEGIN*/{
  "palette": "forest",
  "primaryLogo": "asomtavruli",
  "showCarvedDetails": true,
  "showImagery": true
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAKS_DEFAULTS);
  const palette = PALETTES[tweaks.palette] || PALETTES.forest;

  return (
    <>
      <DesignCanvas title="Colchis Food — Brand Identity" subtitle="Logo · 7 palettes · type system · sub-brands · packaging · homepage" defaultZoom={0.45}>
        <DCSection id="intro" title="00 · Brand Direction">
          <DCArtboard id="brand-intro" label="The brief" width={1280} height={620}>
            <BrandIntro palette={palette} />
          </DCArtboard>
        </DCSection>

        <DCSection id="logos" title="01 · Logo">
          <DCArtboard id="logo-asom" label="Stone-Carved CF" width={520} height={620}>
            <div style={{ width: 520, height: 620, background: palette.cream, display: "flex", alignItems: "center", justifyContent: "center" }}>
              <LogoAsomtavruli palette={palette} size={360} />
            </div>
          </DCArtboard>
          <DCArtboard id="logo-mono" label="Mark on dark" width={520} height={620}>
            <div style={{ width: 520, height: 620, background: palette.ink, display: "flex", alignItems: "center", justifyContent: "center" }}>
              <LogoAsomtavruli palette={{ ...palette, ink: palette.cream, cream: palette.ink, accent: palette.accent2 || palette.accent }} size={360} />
            </div>
          </DCArtboard>
        </DCSection>

        <DCSection id="palettes" title="02 · Color Palettes">
          {Object.entries(PALETTES).map(([key, p]) => (
            <DCArtboard key={key} id={`pal-${key}`} label={p.name} width={720} height={400}>
              <PaletteCard palette={p} active={tweaks.palette === key} />
            </DCArtboard>
          ))}
        </DCSection>

        <DCSection id="type" title="03 · Typography">
          <DCArtboard id="type-spec" label="Fraunces · Inter · JetBrains Mono · Noto Georgian" width={1280} height={920}>
            <TypeSpecimen palette={palette} />
          </DCArtboard>
        </DCSection>

        <DCSection id="sub" title="04 · Sub-Brands">
          <DCArtboard id="sub-creamery" label="The Creamery" width={420} height={520}>
            <div style={{ width: 420, height: 520, background: palette.cream, display: "flex", alignItems: "center", justifyContent: "center" }}>
              <SubBrandLockup palette={palette} sub="The Creamery" />
            </div>
          </DCArtboard>
          <DCArtboard id="sub-bakery" label="The Bakery" width={420} height={520}>
            <div style={{ width: 420, height: 520, background: palette.ink, display: "flex", alignItems: "center", justifyContent: "center" }}>
              <SubBrandLockup palette={palette} sub="The Bakery" dark accentOverride={palette.accent2 || palette.accent} />
            </div>
          </DCArtboard>
        </DCSection>

        <DCSection id="pack" title="05 · Packaging">
          <DCArtboard id="pack-mock" label="Cheese label & bakery box" width={1280} height={620}>
            <PackagingMock palette={palette} />
          </DCArtboard>
        </DCSection>

        <DCSection id="apps" title="06 · Applications">
          <DCArtboard id="apps-row" label="Stamp · Receipt · Tote · Stickers" width={1280} height={520}>
            <ApplicationsRow palette={palette} />
          </DCArtboard>
        </DCSection>

        <DCSection id="hero" title="07 · Homepage Hero (with smart delivery)">
          <DCArtboard id="hp-hero" label="Hero · 1440 × 900" width={1440} height={900}>
            <HomepageHero palette={palette} />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel title="Brand Tweaks">
        <TweakSection title="Palette">
          <TweakSelect
            label="Color system"
            value={tweaks.palette}
            onChange={(v) => setTweak("palette", v)}
            options={[
              { value: "forest", label: "Forest & Copper (recommended)" },
              { value: "wine", label: "Saperavi & Bone" },
              { value: "bone", label: "Bone & Olive" },
              { value: "midnight", label: "Midnight & Brass" },
              { value: "terracotta", label: "Terracotta & Sage" },
              { value: "butter", label: "Butter & Hearth" },
              { value: "slate", label: "Slate & Lichen" },
            ]}
          />
        </TweakSection>
        <TweakSection title="Notes">
          <div style={{ fontSize: 12, lineHeight: 1.5, opacity: 0.75 }}>
            Switch palettes to see every artifact recolor live — logo, type, packaging, hero. Logos A / B / C are presented side-by-side in section 01; pick one and I'll build out a full guidelines doc.
          </div>
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
