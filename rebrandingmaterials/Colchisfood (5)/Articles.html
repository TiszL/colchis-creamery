<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Stories — Colchis Food Journal</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,300..500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Noto+Serif+Georgian:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="site/responsive.css" />
<style>
  html, body { margin: 0; padding: 0; background: #F5F0E6; font-family: 'Inter', sans-serif; color: #1F3026; }
  * { box-sizing: border-box; }
  button, input { font-family: inherit; }

    .ch-filter-bar { grid-template-columns: 1fr !important; gap: 24px !important; }

  @media (max-width: 640px) {
    .ch-h1 { font-size: 56px !important; }
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<script type="text/babel" src="site/articles-index.jsx"></script>
<script type="text/babel">
const PALETTE = { cream: "#F5F0E6", cream2: "#EAE2D2", ink: "#1F3026", ink2: "#2C3D33", accent: "#B96A3D", accent2: "#D9A876", muted: "#7A8278" };
function App() {
  return (
    <div data-screen-label="Colchis Food — Stories">
      <SiteHeader palette={PALETTE} />
      <ArticlesIndex palette={PALETTE} />
      <Footer palette={PALETTE} />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
