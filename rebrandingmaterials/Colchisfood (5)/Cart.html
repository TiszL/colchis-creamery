<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Basket — Colchis Food</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,300..500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Noto+Serif+Georgian:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="site/responsive.css" />
<style>
  html, body { margin: 0; padding: 0; background: #F5F0E6; font-family: 'Inter', sans-serif; color: #1F3026; }
  * { box-sizing: border-box; }
  button, input, textarea { font-family: inherit; }
  input:focus, textarea:focus { border-color: #1F3026 !important; }
  .ch-cart-body > div { min-width: 0; }
  .ch-cart-row { min-width: 0; }
  .ch-cart-row > div { min-width: 0; }
  @media (max-width: 1280px) {
    .ch-cart-body { grid-template-columns: 1fr !important; padding: 40px 32px 80px !important; gap: 36px !important; }
    .ch-cart-summary { position: static !important; max-width: 560px; }
    .ch-cart-banner { padding: 48px 32px 28px !important; }
    .ch-cart-h1 { font-size: 64px !important; }
  }
  @media (max-width: 820px) {
    .ch-cart-h1 { font-size: 48px !important; }
    .ch-cart-banner > div:nth-child(2) { flex-direction: column; align-items: flex-start !important; }
    .ch-cart-body { padding: 32px 20px 64px !important; }
    .ch-cart-row { grid-template-columns: 72px 1fr !important; grid-template-areas: "img info" "stepper price" !important; gap: 14px 16px !important; align-items: flex-start !important; }
    .ch-cart-row > div:nth-child(1) { width: 72px !important; height: 72px !important; grid-area: img; }
    .ch-cart-row > div:nth-child(2) { grid-area: info; }
    .ch-cart-row > div:nth-child(3) { grid-area: stepper; justify-self: start; }
    .ch-cart-row > div:nth-child(4) { grid-area: price; justify-self: end; text-align: right !important; }
    .ch-cart-body > div:first-child > div:last-child > div:last-child { grid-template-columns: 1fr !important; }
    .ch-cart-body > div:first-child > div:nth-child(3) { grid-template-columns: 1fr !important; }
  }
  @media (max-width: 540px) {
    .ch-cart-h1 { font-size: 38px !important; }
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="brand/sublockups.jsx"></script>
<script type="text/babel" src="site/header-hero.jsx"></script>
<script type="text/babel" src="site/sections.jsx"></script>
<script type="text/babel" src="site/cart.jsx"></script>
<script type="text/babel">
const PALETTE = { cream: "#F5F0E6", cream2: "#EAE2D2", ink: "#1F3026", ink2: "#2C3D33", accent: "#B96A3D", accent2: "#D9A876", muted: "#7A8278" };
function App() {
  return (
    <div>
      <SiteHeader palette={PALETTE} />
      <CartPage palette={PALETTE} />
      <Footer palette={PALETTE} />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
